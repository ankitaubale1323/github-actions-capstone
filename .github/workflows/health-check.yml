name: Health Check 

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  health:
    runs-on: ubuntu-latest

    steps:
      - name: Pull Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/github-actions-app:latest

      - name: Run Container
        run: docker run -d -p 80:80 --name test-app ${{ secrets.DOCKER_USERNAME }}/github-actions-app:latest

      - name: Wait for App
        run: sleep 5

      - name: Health Check
        run: |
          STATUS="FAILED"
          if curl -f http://localhost/health; then
            STATUS="PASSED"
          fi

          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- Image: latest" >> $GITHUB_STEP_SUMMARY
          echo "- Status: $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        run: docker rm -f test-app
