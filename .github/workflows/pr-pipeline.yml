name: PR Pipeline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: "3.9"
      run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Print PR Status
        run: echo "PR checks passed for branch ${{ github.head_ref }}"